    Research Experience:
      - company: Evolutionary Computation and Intelligent Systems Lab, Kyungpook National University
        position: PhD Research Fellow
        location: Daegu, South Korea
        start_date: 2022-03
        end_date: 2026-08
        summary: "Funded through the Kyungpook National University Kings Scholarship and National Research Foundation (NRF), Korea. Supervisor: Prof. Rammohan Mallipeddi."
        highlights:
          - Defined and developed a doctoral research direction on adaptive optimization for complex decision-making, focusing on how search processes can regulate behavior, reuse prior experience, and remain effective under competing objectives and constraints.
          - Designed neuro-inspired algorithmic mechanisms that integrate regulation, memory reuse, and domain knowledge into evolutionary search, with applications to autonomous planning and multi-objective decision-making.

      - company: Ethical Stress Testing and Retrofit (E-STAR) for Autonomous Vehicles
        position: Researcher
        location: South Korea
        start_date: 2026-03
        end_date: 2026-08
        summary: Funded by National Research Foundation (NRF), Korea.
        highlights:
          - Addressed the challenge of testing autonomous vehicles under rare, uncertain, and safety-critical driving scenarios.
          - Co-developed the funded NRF proposal and designed a framework using counterfactual scenario generation and evolutionary optimization to expose decision-making failures under real-world distribution shifts.

      - company: Powerful Brain Project
        position: Researcher
        location: South Korea
        start_date: 2025-09
        end_date: 2026-03
        summary: Funded by MSIT, Daegu Digital Innovation Promotion Agency (DIP), and National Information Society Agency (NIA), Korea.
        highlights:
          - Explored how brain-derived feedback can inform computational models of reasoning and decision-making.
          - Developed biologically guided reinforcement learning and post-training ideas aimed at improving adaptability, alignment, and efficiency in large language models.

      - company: Domain-Adversarial Neural Network for HCP Face/Shape Classification
        position: Researcher
        location: South Korea
        start_date: 2025-04
        end_date: 2025-07
        summary: Funded by the NRF Core Research Institute Basic Science Program, Ministry of Education, Korea (2021R1A6A1A03043144).
        highlights:
          - Addressed cross-subject variability in fMRI-based face/shape classification, where individual neural differences can weaken model generalization.
          - Designed a lightweight domain-adaptive model that aligned subject-specific feature distributions while preserving task-relevant neural information.
          - Achieved 96.62% test accuracy while outperforming heavier 3-D CNN and Transformer baselines with substantially lower computational cost.

      - company: Development of Inclusive Unmanned Kiosk for Document Issuance Machine
        position: Researcher
        location: South Korea
        start_date: 2023-06
        end_date: 2024-06
        summary: Funded through the Institute of Information & Communications Technology Planning & Evaluation (IITP), Korea government (MSIT), No. RS2023-00262841.
        highlights:
          - Addressed accessibility barriers in unmanned public-service kiosks by developing lightweight AI modules for gaze, gesture, speech, and demographic analysis.
          - Supported inclusive interaction on low-resource computational systems.
          - Contributed to technology transfer, patent claims, KAIC certification, and journal publications arising from the project.

      - company: AI-based Strawberry Growth Stage Recognition and Cloud Control Platform
        position: Researcher
        location: South Korea
        start_date: 2023-09
        end_date: 2023-12
        summary: Funded by the Digital Innovation Hub (DIP, MSIT & Daegu City, 2023, DBSD2-01) and the National Information Society Agency (NIA, MSIT, 2022-3-030).
        highlights:
          - Addressed the need for automated crop monitoring in smart greenhouses by building a strawberry growth-stage dataset and benchmarking deep learning models across seven developmental stages.
          - Supported stage-aware precision nutrient management through visual growth recognition.

      - company: Real-time Warning System for Traffic Accident Prevention
        position: Researcher
        location: South Korea
        start_date: 2023-01
        end_date: 2023-10
        summary: Funded through Daegu Techno Park (DGTP) 2023 Regional Innovation Centered University Research Activity Support Project.
        highlights:
          - Addressed real-time vehicle identification and tracking for CCTV-based accident-prevention systems.
          - Developed semi-supervised vehicle tracking and re-identification models using synthetic data to reduce annotation dependence.
          - Supported technology transfer and patent publication.

