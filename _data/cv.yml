  image: ""
  summary: Modern AI has advanced rapidly, but still lacks the robustness and computational efficiency of biological intelligence. My work asks how this gap can be narrowed by studying what principles from biological learning can help artificial systems adapt, generalize, and remain stable under dynamic conditions. I approach intelligence as an interaction between learning, memory, and regulation, using reinforcement learning, multi-objective optimization, and neuro-inspired mechanisms to study adaptive behavior under uncertainty and competing objectives. This trajectory has shaped a research profile spanning optimization, NeuroAI, and applied intelligent systems, supported by first-author and collaborative publications across these areas. Beyond publications, I have contributed to government-funded research, technology transfer through patents and industry-facing projects, and academic service through peer review and mentoring.

